<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Research Assistant</title>
    <!-- Tailwind -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        primary: '#3b82f6',
                        secondary: '#8b5cf6',
                        dark: '#0f172a',
                        darkCard: '#1e293b'
                    },
                    animation: {
                        'pulse-fast': 'pulse 1.5s cubic-bezier(0.4, 0, 0.6, 1) infinite',
                    }
                }
            }
        }
    </script>
    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <!-- Babel -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- Markdown Parser -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    
    <style>
        .glass {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .markdown-body {
            font-family: inherit;
            line-height: 1.6;
        }
        .markdown-body h1, .markdown-body h2, .markdown-body h3 { font-weight: 600; margin-top: 1em; margin-bottom: 0.5em; }
        .markdown-body p { margin-bottom: 1em; }
        .markdown-body pre { background: #1e1e1e; color: #d4d4d4; padding: 1em; border-radius: 0.5em; overflow-x: auto; }
        .markdown-body code { font-family: monospace; background: rgba(128,128,128,0.2); padding: 0.2em 0.4em; border-radius: 0.2em; }
        .markdown-body ul { list-style-type: disc; padding-left: 1.5em; margin-bottom: 1em; }
        .markdown-body ol { list-style-type: decimal; padding-left: 1.5em; margin-bottom: 1em; }
        
        .light .markdown-body pre { background: #f3f4f6; color: #1f2937; }
        
        /* Smooth scrolling */
        html { scroll-behavior: smooth; }
        
        /* Scrollbar */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #4b5563; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #6b7280; }
    </style>
</head>
<body class="bg-gray-50 text-gray-900 dark:bg-dark dark:text-gray-100 transition-colors duration-300 font-sans min-h-screen">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const API_URL = "http://localhost:8000/api/research/query";

        // Icons components via basic SVG or just using i tag and lucide.createIcons
        const Icon = ({ name, className }) => (
            <i data-lucide={name} className={className}></i>
        );

        function App() {
            const [darkMode, setDarkMode] = useState(true);
            const [messages, setMessages] = useState([]);
            const [input, setInput] = useState("");
            const [loading, setLoading] = useState(false);
            
            const [modelMode, setModelMode] = useState("auto");
            const [routingMode, setRoutingMode] = useState("rag_and_web");
            
            const [totalTokens, setTotalTokens] = useState({ input: 0, output: 0 });
            const [totalCost, setTotalCost] = useState(0.0);
            const [uploading, setUploading] = useState(false);
            const [uploadMessage, setUploadMessage] = useState("");
            
            const messagesEndRef = useRef(null);
            const fileInputRef = useRef(null);

            useEffect(() => {
                lucide.createIcons();
            }, [messages, loading, darkMode]);
            
            useEffect(() => {
                if (darkMode) document.documentElement.classList.add('dark');
                else document.documentElement.classList.remove('dark');
                lucide.createIcons();
            }, [darkMode]);

            const scrollToBottom = () => {
                messagesEndRef.current?.scrollIntoView({ behavior: "smooth" });
            };

            useEffect(() => {
                scrollToBottom();
            }, [messages, loading]);

            const handleFileUpload = async (e) => {
                const file = e.target.files?.[0];
                if (!file) return;
                
                if (file.size > 200 * 1024 * 1024) {
                    setUploadMessage("File exceeds 200MB limit.");
                    return;
                }
                
                setUploading(true);
                setUploadMessage("Uploading...");
                
                const formData = new FormData();
                formData.append("file", file);
                
                try {
                    const response = await fetch("http://localhost:8000/api/ingest/pdf", {
                        method: "POST",
                        body: formData,
                    });
                    
                    const data = await response.json();
                    if (response.ok) {
                        setUploadMessage("Successfully loaded and indexed PDF.");
                        setTimeout(() => setUploadMessage(""), 3000);
                    } else {
                        setUploadMessage(`Error: ${data.detail || "Upload failed"}`);
                    }
                } catch (err) {
                    setUploadMessage("Connection error during upload.");
                } finally {
                    setUploading(false);
                    if (fileInputRef.current) fileInputRef.current.value = "";
                }
            };
            
            const handleSummarize = () => {
                handleSend("Please summarize the key points of the recently uploaded documents based on the knowledge base.");
            };

            const handleSend = async (queryOverride = null) => {
                const query = queryOverride || input;
                if (!query.trim() || loading) return;

                const userMsg = { role: "user", content: query };
                const newMessages = [...messages, userMsg];
                setMessages(newMessages);
                setInput("");
                setLoading(true);

                try {
                    const response = await fetch(API_URL, {
                        method: "POST",
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify({
                            query,
                            model_mode: modelMode,
                            routing_mode: routingMode,
                            history: messages.slice(-5).map(m => ({role: m.role, content: m.content}))
                        })
                    });
                    
                    const data = await response.json();
                    
                    if (response.ok) {
                        setMessages(prev => [...prev, {
                            role: "assistant", 
                            content: data.answer,
                            sources: data.sources,
                            meta: {
                                latency: data.latency_ms,
                                cost: data.estimated_cost_usd,
                                model: data.routed_model,
                                confidence: data.confidence,
                                warnings: data.warnings
                            }
                        }]);
                        
                        setTotalTokens(prev => ({
                            input: prev.input + data.token_usage.input,
                            output: prev.output + data.token_usage.output
                        }));
                        setTotalCost(prev => prev + data.estimated_cost_usd);
                    } else {
                        setMessages(prev => [...prev, { role: "assistant", content: `Error: ${data.detail || "Server error"}`, isError: true }]);
                    }
                } catch (err) {
                    setMessages(prev => [...prev, { role: "assistant", content: `Connection error. Make sure backend is running on port 8000.`, isError: true }]);
                } finally {
                    setLoading(false);
                }
            };

            const copyToClipboard = (text) => {
                navigator.clipboard.writeText(text);
                // Simple toast could be added here
            };

            const exportMarkdown = () => {
                let md = "# Conversation Export\n\n";
                messages.forEach(m => {
                    md += `### ${m.role === 'user' ? 'User' : 'Assistant'}\n`;
                    md += `${m.content}\n\n`;
                    if (m.sources && m.sources.length > 0) {
                        md += `**Sources:**\n`;
                        m.sources.forEach(s => {
                            md += `- [${s.source_type.toUpperCase()}] ${s.title} (Score: ${s.score?.toFixed(2)})\n`;
                        });
                        md += '\n';
                    }
                });
                
                const blob = new Blob([md], { type: 'text/markdown' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = 'conversation.md';
                a.click();
            };

            const sampleQuestions = [
                "Compare Claude 3.5 Sonnet and GPT-4o pricing.",
                "What is the latest news regarding AI today?",
                "Write a React component for a card.",
                "Explain how Pinecone uses HNSW."
            ];

            return (
                <div className="flex h-screen overflow-hidden">
                    {/* Sidebar */}
                    <div className={`w-72 flex-shrink-0 flex flex-col p-4 border-r transition-colors duration-300
                        ${darkMode ? 'bg-darkCard border-gray-700' : 'bg-white border-gray-200'}`}>
                        
                        <div className="flex items-center gap-3 mb-8">
                            <div className="w-10 h-10 rounded-xl bg-gradient-to-br from-primary to-secondary flex items-center justify-center text-white shadow-lg shadow-primary/30">
                                <Icon name="brain-circuit" />
                            </div>
                            <h1 className="font-bold text-xl tracking-tight bg-clip-text text-transparent bg-gradient-to-r from-primary to-secondary">
                                Research AI
                            </h1>
                        </div>

                        <div className="space-y-6 flex-1 overflow-y-auto pr-2">
                            {/* Upload Section */}
                            <div>
                                <h3 className="text-xs font-semibold text-gray-400 uppercase tracking-wider mb-3">Upload PDF documents</h3>
                                <div className={`p-4 rounded-xl border flex flex-col items-start gap-2 transition-colors
                                    ${darkMode ? 'bg-gray-800/50 border-gray-700' : 'bg-white border-gray-200'}`}>
                                    <input 
                                        type="file" 
                                        accept=".pdf" 
                                        ref={fileInputRef} 
                                        className="hidden" 
                                        onChange={handleFileUpload} 
                                    />
                                    <button 
                                        onClick={() => fileInputRef.current?.click()}
                                        disabled={uploading}
                                        className={`flex items-center gap-2 px-4 py-2 border rounded-lg text-sm font-medium transition-colors
                                            ${darkMode ? 'bg-gray-800 border-gray-600 hover:bg-gray-700 text-white' : 'bg-white border-gray-300 hover:bg-gray-50 text-gray-800'}
                                            ${uploading ? 'opacity-50 cursor-not-allowed' : ''}`}
                                    >
                                        <Icon name="upload" className="w-4 h-4" />
                                        {uploading ? 'Uploading...' : 'Upload'}
                                    </button>
                                    <span className="text-xs text-gray-500">200MB per file • PDF</span>
                                    {uploadMessage && <span className={`text-xs mt-1 ${uploadMessage.includes('Error') ? 'text-red-400' : 'text-green-500'}`}>{uploadMessage}</span>}
                                </div>
                            </div>
                            
                            {/* Document Operations */}
                            <div>
                                <h3 className="text-xs font-semibold text-gray-400 uppercase tracking-wider mb-3">Document Operations</h3>
                                <button 
                                    onClick={handleSummarize}
                                    disabled={loading}
                                    className={`w-full flex items-center justify-center gap-2 px-4 py-2 border rounded-lg text-sm font-medium transition-colors
                                        ${darkMode ? 'bg-gray-800 border-gray-600 hover:bg-gray-700 text-white' : 'bg-white border-gray-300 hover:bg-gray-50 text-gray-800'}`}
                                >
                                    <Icon name="file-text" className="w-4 h-4" />
                                    Summarize Document
                                </button>
                            </div>

                            {/* Settings */}
                            <div>
                                <h3 className="text-xs font-semibold text-gray-400 uppercase tracking-wider mb-3">Model Selection</h3>
                                <select 
                                    className={`w-full p-2.5 rounded-lg border text-sm outline-none transition-colors
                                        ${darkMode ? 'bg-gray-800 border-gray-700 text-white focus:border-primary' : 'bg-gray-50 border-gray-300 focus:border-primary'}`}
                                    value={modelMode}
                                    onChange={e => setModelMode(e.target.value)}
                                >
                                    <option value="auto">Auto-route (Smart)</option>
                                    <option value="claude">Claude 3.5 Sonnet</option>
                                    <option value="gpt4o">GPT-4o</option>
                                    <option value="gemini">Gemini 1.5 Pro</option>
                                    <option value="multi">Multi-Model Synthesis</option>
                                </select>
                            </div>

                            <div>
                                <h3 className="text-xs font-semibold text-gray-400 uppercase tracking-wider mb-3">Context Routing</h3>
                                <select 
                                    className={`w-full p-2.5 rounded-lg border text-sm outline-none transition-colors
                                        ${darkMode ? 'bg-gray-800 border-gray-700 text-white focus:border-primary' : 'bg-gray-50 border-gray-300 focus:border-primary'}`}
                                    value={routingMode}
                                    onChange={e => setRoutingMode(e.target.value)}
                                >
                                    <option value="rag_and_web">RAG + Web Search</option>
                                    <option value="rag_only">RAG Only</option>
                                    <option value="web_only">Web Search Only</option>
                                </select>
                            </div>

                            {/* Stats */}
                            <div className={`p-4 rounded-xl border ${darkMode ? 'bg-gray-800/50 border-gray-700' : 'bg-blue-50 border-blue-100'}`}>
                                <h3 className="text-xs font-semibold text-gray-400 uppercase tracking-wider mb-3 flex items-center gap-2">
                                    <Icon name="activity" className="w-3 h-3" />
                                    Session Stats
                                </h3>
                                <div className="space-y-3 text-sm">
                                    <div className="flex justify-between items-center">
                                        <span className="text-gray-500">In Tokens</span>
                                        <span className="font-mono">{totalTokens.input.toLocaleString()}</span>
                                    </div>
                                    <div className="flex justify-between items-center">
                                        <span className="text-gray-500">Out Tokens</span>
                                        <span className="font-mono">{totalTokens.output.toLocaleString()}</span>
                                    </div>
                                    <div className="flex justify-between items-center pt-2 border-t border-gray-700/50">
                                        <span className="text-gray-500">Est. Cost</span>
                                        <span className={`font-mono font-bold ${totalCost > 0.5 ? 'text-red-400' : 'text-green-400'}`}>
                                            ${totalCost.toFixed(4)}
                                        </span>
                                    </div>
                                </div>
                            </div>
                        </div>

                        <div className="mt-auto pt-4 border-t border-gray-700/50 flex justify-between items-center">
                            <button 
                                onClick={exportMarkdown}
                                className={`p-2 rounded-lg transition-colors flex items-center gap-2 text-sm
                                    ${darkMode ? 'hover:bg-gray-800 text-gray-300' : 'hover:bg-gray-100 text-gray-600'}`}
                                title="Export Markdown"
                            >
                                <Icon name="download" className="w-4 h-4" /> Export
                            </button>
                            <button 
                                onClick={() => setDarkMode(!darkMode)}
                                className={`p-2 rounded-lg transition-colors
                                    ${darkMode ? 'hover:bg-gray-800 text-yellow-400' : 'hover:bg-gray-100 text-gray-600'}`}
                            >
                                <Icon name={darkMode ? "sun" : "moon"} className="w-5 h-5" />
                            </button>
                        </div>
                    </div>

                    {/* Main Chat Area */}
                    <div className="flex-1 flex flex-col relative">
                        {/* Background pattern */}
                        <div className="absolute inset-0 z-0 opacity-[0.03] pointer-events-none" 
                             style={{backgroundImage: 'radial-gradient(circle at 2px 2px, currentColor 1px, transparent 0)', backgroundSize: '24px 24px'}}>
                        </div>

                        <div className="flex-1 overflow-y-auto p-4 md:p-8 z-10 scroll-smooth pb-32">
                            {messages.length === 0 ? (
                                <div className="h-full flex flex-col items-center justify-center max-w-2xl mx-auto text-center space-y-8 animate-fade-in">
                                    <div className="w-20 h-20 rounded-2xl bg-gradient-to-tr from-primary to-secondary flex items-center justify-center shadow-2xl shadow-primary/20 transform hover:scale-105 transition-transform">
                                        <Icon name="sparkles" className="w-10 h-10 text-white" />
                                    </div>
                                    <h2 className="text-4xl font-bold tracking-tight">How can I help you research today?</h2>
                                    <p className="text-gray-500 max-w-lg text-lg">
                                        I can search the web, query your internal documents, write code, or synthesize answers across multiple top-tier AI models.
                                    </p>
                                    
                                    <div className="grid grid-cols-1 md:grid-cols-2 gap-3 w-full mt-8">
                                        {sampleQuestions.map((q, i) => (
                                            <button 
                                                key={i}
                                                onClick={() => handleSend(q)}
                                                className={`text-left p-4 rounded-xl border transition-all duration-200 transform hover:-translate-y-1 hover:shadow-lg
                                                    ${darkMode ? 'bg-gray-800/50 border-gray-700 hover:bg-gray-700' : 'bg-white border-gray-200 hover:border-primary/30'}`}
                                            >
                                                <div className="flex justify-between items-center text-sm">
                                                    <span>{q}</span>
                                                    <Icon name="arrow-up-right" className="w-4 h-4 opacity-50" />
                                                </div>
                                            </button>
                                        ))}
                                    </div>
                                </div>
                            ) : (
                                <div className="max-w-4xl mx-auto space-y-8">
                                    {messages.map((msg, idx) => (
                                        <div key={idx} className={`flex ${msg.role === 'user' ? 'justify-end' : 'justify-start'}`}>
                                            <div className={`max-w-[85%] rounded-2xl p-5 shadow-sm
                                                ${msg.role === 'user' 
                                                    ? 'bg-gradient-to-br from-primary to-blue-600 text-white rounded-br-none' 
                                                    : darkMode 
                                                        ? 'glass rounded-bl-none' 
                                                        : 'bg-white border border-gray-100 rounded-bl-none'
                                                } ${msg.isError ? 'border-red-500 bg-red-500/10' : ''}`}
                                            >
                                                {msg.role === 'assistant' && msg.meta && (
                                                    <div className="flex items-center gap-3 mb-4 text-xs font-mono text-gray-500 border-b border-gray-700/30 pb-2">
                                                        <span className="flex items-center gap-1">
                                                            <Icon name="cpu" className="w-3 h-3" />
                                                            {msg.meta.model.toUpperCase()}
                                                        </span>
                                                        <span>•</span>
                                                        <span className="flex items-center gap-1">
                                                            <Icon name="clock" className="w-3 h-3" />
                                                            {msg.meta.latency}ms
                                                        </span>
                                                        <span>•</span>
                                                        <span className="flex items-center gap-1">
                                                            <Icon name="zap" className="w-3 h-3" />
                                                            Confidence: <span className={`${msg.meta.confidence === 'HIGH' ? 'text-green-500' : msg.meta.confidence === 'MEDIUM' ? 'text-yellow-500' : 'text-red-500'}`}>{msg.meta.confidence}</span>
                                                        </span>
                                                    </div>
                                                )}
                                                
                                                <div 
                                                    className="markdown-body text-sm md:text-base leading-relaxed"
                                                    dangerouslySetInnerHTML={{ __html: msg.role === 'user' ? msg.content : marked.parse(msg.content) }}
                                                />
                                                
                                                {/* Sources */}
                                                {msg.sources && msg.sources.length > 0 && (
                                                    <div className="mt-6 pt-4 border-t border-gray-700/30">
                                                        <h4 className="text-xs font-semibold text-gray-500 uppercase tracking-wider mb-3 flex items-center gap-2">
                                                            <Icon name="book-open" className="w-3 h-3" />
                                                            Sources
                                                        </h4>
                                                        <div className="grid grid-cols-1 md:grid-cols-2 gap-2">
                                                            {msg.sources.map((src, i) => (
                                                                <div key={i} className={`text-xs p-3 rounded-lg border
                                                                    ${darkMode ? 'bg-gray-800/50 border-gray-700' : 'bg-gray-50 border-gray-200'}`}>
                                                                    <div className="flex justify-between items-start mb-1">
                                                                        <span className="font-semibold truncate pr-2 text-primary">
                                                                            {src.title}
                                                                        </span>
                                                                        <span className={`px-1.5 py-0.5 rounded text-[10px] font-mono ${src.source_type === 'web' ? 'bg-blue-500/20 text-blue-400' : 'bg-green-500/20 text-green-400'}`}>
                                                                            {src.source_type.toUpperCase()}
                                                                        </span>
                                                                    </div>
                                                                    <div className="text-gray-500 line-clamp-2">{src.content}</div>
                                                                    <div className="mt-2 text-[10px] font-mono text-gray-400">Score: {src.score?.toFixed(2)}</div>
                                                                </div>
                                                            ))}
                                                        </div>
                                                    </div>
                                                )}
                                                
                                                {/* Action Bar */}
                                                {msg.role === 'assistant' && !msg.isError && (
                                                    <div className="mt-4 flex gap-2">
                                                        <button onClick={() => copyToClipboard(msg.content)} className="text-gray-400 hover:text-primary transition-colors">
                                                            <Icon name="copy" className="w-4 h-4" />
                                                        </button>
                                                    </div>
                                                )}
                                            </div>
                                        </div>
                                    ))}
                                    
                                    {loading && (
                                        <div className="flex justify-start">
                                            <div className={`rounded-2xl p-5 shadow-sm rounded-bl-none flex items-center gap-3
                                                ${darkMode ? 'bg-gray-800 border border-gray-700' : 'bg-white border border-gray-100'}`}>
                                                <div className="w-2 h-2 rounded-full bg-primary animate-bounce" style={{animationDelay: '0ms'}}></div>
                                                <div className="w-2 h-2 rounded-full bg-primary animate-bounce" style={{animationDelay: '150ms'}}></div>
                                                <div className="w-2 h-2 rounded-full bg-primary animate-bounce" style={{animationDelay: '300ms'}}></div>
                                                <span className="text-sm text-gray-500 font-mono ml-2">Synthesizing response...</span>
                                            </div>
                                        </div>
                                    )}
                                    <div ref={messagesEndRef} />
                                </div>
                            )}
                        </div>

                        {/* Input Area */}
                        <div className={`absolute bottom-0 w-full p-4 z-20 transition-colors
                            ${darkMode ? 'bg-gradient-to-t from-dark via-dark to-transparent' : 'bg-gradient-to-t from-gray-50 via-gray-50 to-transparent'}`}>
                            <div className="max-w-4xl mx-auto">
                                <form 
                                    onSubmit={(e) => { e.preventDefault(); handleSend(); }}
                                    className={`relative flex items-center rounded-2xl shadow-xl border overflow-hidden
                                        ${darkMode ? 'bg-gray-800 border-gray-700 shadow-black/50' : 'bg-white border-gray-200'}`}
                                >
                                    <input 
                                        type="text"
                                        value={input}
                                        onChange={e => setInput(e.target.value)}
                                        placeholder="Ask a question or request research..."
                                        className="w-full bg-transparent p-4 pr-14 text-sm md:text-base outline-none"
                                        disabled={loading}
                                    />
                                    <button 
                                        type="submit"
                                        disabled={!input.trim() || loading}
                                        className={`absolute right-2 p-2 rounded-xl transition-all duration-200
                                            ${!input.trim() || loading 
                                                ? 'text-gray-500' 
                                                : 'bg-primary text-white hover:bg-blue-600 shadow-md transform hover:scale-105'}`}
                                    >
                                        <Icon name="send" className="w-5 h-5" />
                                    </button>
                                </form>
                                <div className="text-center mt-2 text-xs text-gray-500 font-mono">
                                    AI Research Assistant - Responses may occasionally contain inaccuracies.
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
